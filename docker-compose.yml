# ─── local one-shot job for xero_service_v2 ───
#
# This service is NOT a long-running server. It is a stateless CLI job: it
# fetches raw Xero pages and writes them to GCS (or local disk with --dry-run),
# then exits. There is no Postgres, Redis, BigQuery, or HTTP listener.
#
# In production the host scheduler (cron / systemd timer / Cloud Scheduler /
# Cloud Run Job) invokes the container per the layered cadence — see
# deploy/crontab.example and docs/OPERATIONS.md.
#
# Locally this compose file is mainly for a self-contained dry-run that needs no
# GCS credentials: it writes the raw object layout to ./out on the host.
#
#   # dry-run reports to ./out (no bucket, no secrets needed beyond Xero auth):
#   docker compose run --rm xero sync --reports --as-of 2026-06-17 \
#       --dry-run --local-dir /out
#
#   # a real incremental window against the dev bucket (needs GCS_BUCKET +
#   # GOOGLE_APPLICATION_CREDENTIALS in .env, and the SA JSON bind-mounted):
#   docker compose run --rm xero sync --window-days 3 --tenant <uuid>
#
#   # prove auth + bucket wiring:
#   docker compose run --rm xero healthcheck --check-bucket

services:
  xero:
    build:
      context: .
      dockerfile: Dockerfile
    image: xero-service-v2:local
    # Reads Xero custom-connection + GCS env from .env (copy from .env.example).
    # No hardcoded credentials live in this file.
    env_file:
      - .env
    volumes:
      # Dry-run output lands here so you can inspect the raw object layout.
      - ./out:/out
      # GCS service-account JSON for real (non-dry-run) uploads. The path inside
      # the container must match GOOGLE_APPLICATION_CREDENTIALS in your .env,
      # e.g. GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcs-sa.json.
      - ${GCS_SA_JSON:-./gcs-sa.json}:/secrets/gcs-sa.json:ro
    # No command here: pass the CLI args on `docker compose run`, e.g.
    #   docker compose run --rm xero sync --window-days 3 --dry-run --local-dir /out
    # The default (healthcheck) runs if invoked with `docker compose up`.
