# Local port remap to avoid collision with lago-db (5434) and lago-redis (6381).
# Internal container DNS (xero-postgres:5432, xero-redis:6379) unchanged.
# !override forces replacement of base ports list instead of append.
services:
  xero-postgres:
    ports: !override
      - "5435:5432"
  xero-redis:
    ports: !override
      - "6382:6379"
  # Mount GCP service-account JSON read-only so the BQ sink can authenticate.
  # Set XERO_GCP_SA_PATH on the host to the absolute path of your SA JSON
  # (use an absolute path if the host directory name contains spaces — some
  # Docker Desktop versions silently mis-mount compose-relative paths in that
  # case, creating an empty dir at the target instead of mounting the file).
  xero-server:
    volumes:
      - "${XERO_GCP_SA_PATH:-./app/gcp-credentials.json}:/app/gcp-credentials.json:ro"
    environment:
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-prj-dw-dev}
      BIGQUERY_DATASET: ${BIGQUERY_DATASET:-dw_1_bronze_xero}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-credentials.json
